when:
  event: [push, pull_request]

steps:
  web:
    image: node:24-bookworm
    commands:
      - corepack enable
      - corepack prepare pnpm@10.32.0 --activate
      - pnpm install --frozen-lockfile
      - pnpm --dir apps/web check
      - pnpm --dir apps/web lint
      - pnpm --dir apps/web test:unit -- --run
